<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Радионяня 5G</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #121214; color: #ffffff; text-align: center; padding: 20px; margin: 0; }
        .card { background: #1c1c1e; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); max-width: 400px; margin: 20px auto; box-sizing: border-box; }
        h2, h3 { margin-top: 0; color: #fff; }
        p { color: #aeaeb2; font-size: 15px; line-height: 1.4; }
        button { background: #0a84ff; color: white; border: none; padding: 16px; font-size: 16px; font-weight: bold; border-radius: 12px; cursor: pointer; width: 100%; margin: 10px 0; -webkit-tap-highlight-color: transparent; }
        .btn-child { background: #34c759; }
        .hidden { display: none !important; }
        video { width: 100%; border-radius: 12px; background: #000; margin-top: 15px; transform: scaleX(-1); }
        #p-stream { transform: none; }
        .alert { background: #ff453a; color: white; padding: 15px; border-radius: 12px; font-weight: bold; animation: blink 1s infinite; margin-top: 15px; font-size: 18px; }
        @keyframes blink { 50% { opacity: 0.4; } }
        .status-active { color: #34c759; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card" id="setup-screen">
        <h2>Моя Радионяня 5G</h2>
        <p>Выберите режим для этого iPhone:</p>
        <button class="btn-child" onclick="initMode('child')">👶 Оставить у ребенка</button>
        <button onclick="initMode('parent')">👨‍👩‍👦 Забрать с собой</button>
    </div>

    <div class="card hidden" id="child-screen">
        <h3>Режим: Малыш 👶</h3>
        <p id="c-status">Энергосбережение: камера выключена</p>
        <button id="c-start-btn" onclick="startChildMode()">Включить охрану (микрофон)</button>
        <video id="c-preview" autoplay playsinline muted class="hidden"></video>
    </div>

    <div class="card hidden" id="parent-screen">
        <h3>Режим: Родитель 👨‍👩‍👦</h3>
        <p id="p-status">Подключение к сети...</p>
        <div id="alarm" class="alert hidden">⚠️ РЕБЕНОК ПЛАЧЕТ! ИДЕТ ТРАНСЛЯЦИЯ</div>
        <video id="p-stream" autoplay playsinline></video>
    </div>

    <script>
        let currentMode = "";
        let audioStream = null;
        let fullMediaStream = null;
        let peerConnection = null;
        let ws = null;
        let isCrying = false;

        const roomId = "sergenkins_cpu_baby_room";
        const wsUrl = `wss://api.piesocket.com/v3/${roomId}?api_key=VCXCEuvhGcBDP7XhiJJUDvR1e1D3YfV0w9IpSg9B&notify=1`;

        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        function initMode(mode) {
            currentMode = mode;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById(`${mode}-screen`).classList.remove('hidden');
            
            if (mode === 'parent') {
                createPeerConnection();
            }
            connectToSignaling();
        }

        function connectToSignaling() {
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                if (currentMode === 'parent') {
                    document.getElementById('p-status').innerText = "Слушаю комнату... Камера ребенка спит.";
                    document.getElementById('p-status').classList.add('status-active');
                }
            };

            ws.onmessage = async (event) => {
                const data = JSON.parse(event.data);
                if (data.sender === currentMode) return; // Игнорируем эхо

                if (currentMode === 'parent') {
                    if (data.type === 'webrtc_offer') {
                        triggerAlarm();
                        handleVideoOffer(data.sdp);
                    } else if (data.type === 'child_calmed_down') {
                        resetAlarm();
                    }
                } 
                
                if (currentMode === 'child') {
                    if (data.type === 'webrtc_answer') {
                        if (peerConnection) {
                            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp));
                        }
                    }
                }
            };

            ws.onclose = () => {
                setTimeout(connectToSignaling, 2000);
            };
        }

        // --- ЛОГИКА МАЛЫША (ЭКОНОМИЯ БАТАРЕИ) ---
        async function startChildMode() {
            try {
                // Запрашиваем ТОЛЬКО аудио для экономии батареи
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                document.getElementById('c-start-btn').classList.add('hidden');
                document.getElementById('c-status').innerText = "Режим охраны активен. Камера выключена.";
                document.getElementById('c-status').classList.add('status-active');
                
                startAudioAnalysis();
            } catch (err) {
                alert("Пожалуйста, разрешите доступ к микрофону.");
            }
        }

        function startAudioAnalysis() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(audioStream);
            const analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);
            
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            let silenceCounter = 0;

            setInterval(async () => {
                analyser.getByteFrequencyData(dataArray);
                let total = 0;
                for (let i = 0; i < bufferLength; i++) { total += dataArray[i]; }
                let average = total / bufferLength;

                // Порог шума = 12 (чувствительный для iOS микрофонов)
                if (average > 12) {
                    silenceCounter = 0;
                    if (!isCrying) {
                        isCrying = true;
                        document.getElementById('c-status').innerText = "Обнаружен шум! Включаю камеру...";
                        await activateCameraAndStream();
                    }
                } else {
                    if (isCrying) {
                        silenceCounter++;
                        // Если в комнате тихо больше 10 секунд (25 * 400мс), выключаем камеру назад
                        if (silenceCounter > 25) {
                            isCrying = false;
                            stopCameraAndStream();
                        }
                    }
                }
            }, 400);
        }

        async function activateCameraAndStream() {
            try {
                // Включаем камеру и микрофон на полную мощность
                fullMediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: { facingMode: "user" } });
                
                const preview = document.getElementById('c-preview');
                preview.srcObject = fullMediaStream;
                preview.classList.remove('hidden');

                // Инициализируем WebRTC соединение от ребенка к родителю
                if (peerConnection) { peerConnection.close(); }
                peerConnection = new RTCPeerConnection(rtcConfig);
                
                fullMediaStream.getTracks().forEach(track => peerConnection.addTrack(track, fullMediaStream));

                peerConnection.onicecandidate = (event) => {
                    if (!event.candidate && peerConnection.localDescription) {
                        ws.send(JSON.stringify({
                            type: 'webrtc_offer',
                            sender: 'child',
                            sdp: peerConnection.localDescription
                        }));
                    }
                };

                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);

            } catch (e) {
                console.error("Не удалось запустить камеру при тревоге", e);
            }
        }

        function stopCameraAndStream() {
            document.getElementById('c-status').innerText = "Малыш успокоился. Камера отключена для экономии батареи.";
            document.getElementById('c-preview').classList.add('hidden');
            
            if (fullMediaStream) {
                fullMediaStream.getTracks().forEach(track => track.stop());
            }
            if (peerConnection) {
                peerConnection.close();
            }
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'child_calmed_down', sender: 'child' }));
            }
        }

        // --- ЛОГИКА РОДИТЕЛЯ (АВТОМАТИЧЕСКИЙ ПРИЕМ) ---
        function createPeerConnection() {
            peerConnection = new RTCPeerConnection(rtcConfig);
            
            peerConnection.ontrack = (event) => {
                const remoteVideo = document.getElementById('p-stream');
                if (remoteVideo.srcObject !== event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                    document.getElementById('p-status').innerText = "Связь установлена. Видео транслируется.";
                }
            };
        }

        function triggerAlarm() {
            document.getElementById('alarm').classList.remove('hidden');
            
            // Голосовое оповещение срабатывает мгновенно
            const speech = new SpeechSynthesisUtterance("Внимание! Обнаружен шум в комнате!");
            speech.lang = "ru-RU";
            window.speechSynthesis.speak(speech);
        }

        function resetAlarm() {
            document.getElementById('alarm').classList.add('hidden');
            document.getElementById('p-status').innerText = "Малыш уснул. Камера отключена.";
            const remoteVideo = document.getElementById('p-stream');
            remoteVideo.srcObject = null;
            createPeerConnection(); // Пересоздаем для следующего сеанса связи
        }

        async function handleVideoOffer(sdp) {
            if (currentMode !== 'parent' || !peerConnection) return;
            
            await peerConnection.setRemoteDescription(new RTCSessionDescription(sdp));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            ws.send(JSON.stringify({
                type: 'webrtc_answer',
                sender: 'parent',
                sdp: peerConnection.localDescription
            }));
        }
    </script>
</body>
</html>
